server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend Cloud Run service
    # This URL will be configured via an environment variable or hardcoded for now
    # Recommended approach: set VITE_API_URL during build time
    location /api {
        proxy_pass http://backend-service-placeholder; # To be replaced or handled via frontend build env
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
