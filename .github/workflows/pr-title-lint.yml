name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  pr-title-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          # Check format: feat/fix/chore: description
          if ! [[ "$PR_TITLE" =~ ^(feat|fix|chore|docs|test|refactor)(\(.+\))?: .+ ]]; then
            echo "PR title must follow format: 'feat|fix|chore|docs|test|refactor: description'"
            echo "   Examples:"
            echo "   - feat: add Infermedica triage integration"
            echo "   - fix(symptom-agent): handle missing ZIP codes"
            echo "   - chore: update dependencies"
            exit 1
          fi
          echo "PR title format valid"