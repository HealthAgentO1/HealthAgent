version: '3.8'

services:
  db:
    image: postgres:14
    container_name: myproject_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myprojectdb}
      POSTGRES_USER: ${POSTGRES_USER:-myprojectuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
